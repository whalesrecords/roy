[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (FastAPI Depends)
    "N803",  # argument name should be lowercase (some SQLAlchemy patterns)
    "SIM108", # use ternary operator (not always more readable)
]

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["E501", "F401"]
"app/models/*" = ["N815"]  # mixedCase for SQLAlchemy column names

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
