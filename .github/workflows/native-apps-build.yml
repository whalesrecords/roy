name: Build native apps (EAS)

# Cloud-builds the React Native apps via Expo's EAS service. Triggered
# manually so we don't burn the free EAS quota on every commit. Reads
# the EXPO_TOKEN secret to authenticate non-interactively.

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        required: true
        type: choice
        options:
          - admin
          - artist
          - both
      platform:
        description: 'iOS / Android / both'
        required: true
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'EAS profile'
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event.inputs.app }}" = "both" ]; then
            echo 'apps=["admin","artist"]' >> $GITHUB_OUTPUT
          else
            echo 'apps=["${{ github.event.inputs.app }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.matrix.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: native-apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps

      - name: Build with EAS
        working-directory: native-apps/${{ matrix.app }}
        run: |
          eas build \
            --profile ${{ github.event.inputs.profile }} \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive \
            --no-wait
